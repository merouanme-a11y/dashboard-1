# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    upload_dir: '%kernel.project_dir%/public/uploads'
    bi_sharepoint_data_dir: '%kernel.project_dir%/data/sharepoint'
    legacy_directory_db_name: 'mydash83'
    youtrack_url: 'https://maintenance.adep.com'
    youtrack_token: 'perm-TWVyb3Vhbg==.NTAtMTA=.VmHAxQFu0LsdFFg1p86ORO4nkelUus'
    youtrack_project: 'MTN'
    youtrack_default_project_leader_id: '1-1'
    youtrack_default_project_leader_login: 'Merouan'
    youtrack_default_project_leader_email: 'm.hamzaoui@adep.com'
    youtrack_project_template_short_name: 'MLDP'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $mailerFrom: '%env(string:MAILER_FROM)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Legacy/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\Service\FileUploadService:
        arguments:
            $uploadDir: '%upload_dir%'

    App\Service\LegacyDirectoryOptionsService:
        arguments:
            $legacyDatabaseName: '%legacy_directory_db_name%'
            $cache: '@app.directory_cache_pool'

    App\Service\DirectoryServiceManager:
        arguments:
            $legacyDatabaseName: '%legacy_directory_db_name%'
            $cache: '@app.directory_cache_pool'

    App\Service\ThemeService:
        arguments:
            $cache: '@app.theme_cache_pool'

    App\Service\PageDisplayService:
        arguments:
            $cache: '@app.page_display_cache_pool'

    App\Service\ApiResultCacheService:
        arguments:
            $cache: '@app.api_result_cache_pool'
            $cachePool: '@app.api_result_cache_pool'

    App\Service\YouTrackApiService:
        arguments:
            $youTrackUrl: '%youtrack_url%'
            $youTrackToken: '%youtrack_token%'
            $youTrackProject: '%youtrack_project%'

    App\Service\SharePointDataService:
        arguments:
            $dataDirectory: '%bi_sharepoint_data_dir%'

    App\Service\GanttLegacyRuntime:
        arguments:
            $youtrackUrl: '%youtrack_url%'
            $youtrackToken: '%youtrack_token%'
            $youtrackProject: '%youtrack_project%'
            $youtrackDefaultProjectLeaderId: '%youtrack_default_project_leader_id%'
            $youtrackDefaultProjectLeaderLogin: '%youtrack_default_project_leader_login%'
            $youtrackDefaultProjectLeaderEmail: '%youtrack_default_project_leader_email%'
            $youtrackProjectTemplateShortName: '%youtrack_project_template_short_name%'
