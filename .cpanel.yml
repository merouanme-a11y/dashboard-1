---
deployment:
  tasks:
    - export DEPLOYPATH=/home/meha0348/public_html
    - export REPOPATH=/home/meha0348/repositories/dashboard-1
    - /bin/mkdir -p "$DEPLOYPATH"
    - /usr/bin/rsync -a --exclude='.git/' --exclude='.cpanel.yml' ./ "$DEPLOYPATH"/
    - /bin/sh -c 'chmod 711 /home/meha0348 || true'
    - /bin/sh -c 'chmod 755 /home/meha0348/repositories || true'
    - /bin/sh -c 'for target in "$REPOPATH" "$DEPLOYPATH"; do if [ -d "$target" ]; then find "$target" -type d -exec chmod 755 {} \; && find "$target" -type f -exec chmod 644 {} \; ; fi; done'
    - /bin/sh -c 'for dir in "$REPOPATH/var" "$REPOPATH/uploads" "$REPOPATH/public/uploads" "$REPOPATH/public/modules/gantt-projects/export" "$DEPLOYPATH/var" "$DEPLOYPATH/uploads" "$DEPLOYPATH/public/uploads" "$DEPLOYPATH/public/modules/gantt-projects/export"; do if [ -d "$dir" ] || mkdir -p "$dir"; then chmod 775 "$dir" || true; fi; done'
    - /bin/sh -c 'for file in "$REPOPATH/.htaccess" "$REPOPATH/public/.htaccess" "$DEPLOYPATH/.htaccess" "$DEPLOYPATH/public/.htaccess"; do if [ -f "$file" ]; then chmod 644 "$file" || true; fi; done'
    - /bin/sh -c 'COMPOSER_BIN=""; if command -v composer >/dev/null 2>&1; then COMPOSER_BIN="$(command -v composer)"; elif [ -x /opt/cpanel/composer/bin/composer ]; then COMPOSER_BIN=/opt/cpanel/composer/bin/composer; elif [ -x /usr/local/bin/composer ]; then COMPOSER_BIN=/usr/local/bin/composer; fi; if [ -n "$COMPOSER_BIN" ]; then for appdir in "$REPOPATH" "$DEPLOYPATH"; do if [ -f "$appdir/composer.json" ]; then cd "$appdir" && COMPOSER_ALLOW_SUPERUSER=1 "$COMPOSER_BIN" install --no-dev --prefer-dist --no-interaction --optimize-autoloader || true; fi; done; fi'
    - /bin/sh -c 'if command -v php >/dev/null 2>&1; then for appdir in "$REPOPATH" "$DEPLOYPATH"; do if [ -f "$appdir/bin/console" ]; then cd "$appdir" && APP_ENV=prod APP_DEBUG=0 php bin/console cache:clear --env=prod --no-debug || true; fi; done; fi'
