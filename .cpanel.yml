---
deployment:
  tasks:
    - export DEPLOYPATH=/home/meha0348/public_html
    - /bin/mkdir -p "$DEPLOYPATH"
    - /usr/bin/rsync -a --exclude='.git/' --exclude='.cpanel.yml' ./ "$DEPLOYPATH"/
    - /bin/sh -c 'cd "$DEPLOYPATH" && if command -v php >/dev/null 2>&1; then APP_ENV=prod APP_DEBUG=0 php bin/console cache:clear --env=prod --no-debug; fi'
